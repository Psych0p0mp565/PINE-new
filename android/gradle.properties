# Keep heap within system RAM (e.g. 7GB machine). 2G heap leaves room for OS and emulator.
org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Use old AGP DSL so Flutter Gradle plugin works (Flutter 3.41+)
android.newDsl=false
# Avoid Kotlin daemon crash when project (D:) and Pub cache (C:) are on different drives
kotlin.incremental=false

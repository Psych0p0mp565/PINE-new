plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

ext.kotlin_version = '1.9.24'

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.pine.pine"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.pine.pine"
        minSdkVersion flutter.minSdkVersion
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define flutter.sdk in local.properties.")
}
def engineDir = new File(flutterRoot, "bin/cache/artifacts/engine")
def jarPaths = [
    "android-x64/flutter.jar",
    "android-x86_64/flutter.jar",
    "android-arm64-v8a-release/flutter.jar",
    "android-arm64-release/flutter.jar",
    "android-arm-release/flutter.jar"
]
def flutterJar = jarPaths.collect { new File(engineDir, it) }.find { it.exists() }
if (flutterJar == null) {
    throw new GradleException(
        "Flutter engine jar not found. Run 'flutter precache' then try again. Looked in: " + engineDir.absolutePath
    )
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    // Workaround: Flutter plugin does not add embedding to classpath (flutter/flutter#177417)
    implementation files(flutterJar.absolutePath)
    // FlutterActivity extends LifecycleOwner; required for Kotlin to resolve supertypes
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.6.2"
}